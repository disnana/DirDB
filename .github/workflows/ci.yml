name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Rust quality and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python-tests:
    name: Python wheel tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - run: python -m pip install pytest
      - run: python -m pip install --no-deps dist/*.whl
      - run: python -m pytest tests/python -q
      - run: python -m compileall python examples tests benchmark -q

  wheels:
    name: Wheel (${{ matrix.os }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  source:
    name: Source distribution
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, python-tests, wheels, source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: release-dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: release-dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-dist/*

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, python-tests, wheels, source]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/DirDB-Rust/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: publish-dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: publish-dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
