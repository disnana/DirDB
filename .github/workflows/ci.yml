name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Rust quality and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: python -m pip install ruff
      - run: ruff check python examples tests benchmark
      - run: ruff format --check python examples tests benchmark

  release-eligibility:
    name: Check PyPI version
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          PACKAGE_NAME: DirDB-Rust
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          status=$(curl --silent --output /dev/null --write-out '%{http_code}' "https://pypi.org/pypi/${PACKAGE_NAME}/${version}/json")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if [ "$status" = "404" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "PyPI does not contain ${PACKAGE_NAME} ${version}; publication is eligible."
          elif [ "$status" = "200" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "PyPI already contains ${PACKAGE_NAME} ${version}; skipping publication."
          else
            echo "Unexpected PyPI response: ${status}" >&2
            exit 1
          fi

  python-tests:
    name: Python wheel tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - run: python -m pip install pytest
      - run: python -m pip install --no-deps dist/*.whl
      - run: python -m pytest tests/python -q
      - run: python -m compileall python examples tests benchmark -q

  wheels:
    name: Wheel (${{ matrix.os }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - run: python -m pip install pytest
      - run: python -m pip install --no-deps dist/*.whl
      - run: python -m pytest tests/python -q
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  source:
    name: Source distribution
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-eligibility.outputs.publish == 'true'
    needs: [release-eligibility, python-tests, wheels, source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: release-dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: release-dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-eligibility.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.release-eligibility.outputs.version }}
          generate_release_notes: true
          files: release-dist/*

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-eligibility.outputs.publish == 'true'
    needs: [release-eligibility, python-tests, wheels, source]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: publish-dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: publish-dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
